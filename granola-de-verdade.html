<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="">
  <title></title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<nav id="main-nav">
  <div class="nav-inner">
    <div class="nav-logo" onclick="goHome()">
      <img src="" alt="">
    </div>
    <button class="nav-cta" onclick="goPedido()"></button>
  </div>
</nav>

<div id="page-home" class="page active">
  <div class="container">
    <div class="hero fade-in">
      <div class="hero-side">
        <div class="hero-copy">
          <div class="hero-badge"></div>
          <h1></h1>
          <p class="hero-desc"></p>
        </div>

        <div class="hero-details">
          <div class="float-badges"></div>

          <div class="hero-actions">
            <button class="btn-primary" onclick="goPedido()"></button>
            <button class="btn-ghost" onclick="document.getElementById('sobre').scrollIntoView({ behavior: 'smooth' })"></button>
          </div>
        </div>
      </div>

      <div class="hero-img-wrap">
        <img src="" alt="">
      </div>
    </div>
  </div>

  <div class="ingredients">
    <div id="ingredients-track" class="ing-track"></div>
  </div>

  <div class="stats-bar">
    <div class="stats-grid"></div>
  </div>

  <section id="sobre" class="section fade-in">
    <div class="container">
      <div class="about-inner">
        <div class="about-img-wrap">
          <img src="" alt="">
        </div>
        <div class="about-copy">
          <div class="section-label"></div>
          <h2></h2>
          <p></p>
          <div class="pills"></div>
        </div>
      </div>
    </div>
  </section>

  <section class="t-section fade-in">
    <div class="container">
      <div class="section-header">
        <div class="lbl" id="testimonials-label"></div>
        <h2 id="testimonials-title"></h2>
      </div>
      <div class="hero-trust testimonials-trust">
        <div class="hero-avatars"></div>
        <div class="hero-trust-text"></div>
      </div>
      <div class="t-stack"></div>
    </div>
  </section>

  <div class="container">
    <div class="cta-block fade-in">
      <div class="cta-copy">
        <h2></h2>
        <img class="cta-image cta-image-mobile" src="" alt="">
        <p></p>
        <button class="btn-light" onclick="goPedido()"></button>
      </div>
      <img class="cta-image cta-image-desktop" src="" alt="">
    </div>
  </div>

  <footer>
    <img class="footer-logo" src="" alt="">
    <p></p>
  </footer>
</div>

<div id="page-pedido" class="page">
  <div class="container">
    <div class="pedido-hero">
      <div class="lbl"></div>
      <h1></h1>
      <p></p>
    </div>
  </div>

  <div class="container">
    <div class="product-strip">
      <div class="pi-img">
        <img src="" alt="">
      </div>
      <div class="pi-text">
        <h3></h3>
        <p></p>
        <div class="pi-badges"></div>
      </div>
    </div>

    <div class="qty-label-row"></div>
    <div class="qty-stack"></div>

    <div class="delivery-note"></div>

    <div id="empty-state"></div>

    <div id="order-summary-wrap">
      <div class="order-summary">
        <h3></h3>
        <div class="sum-row">
          <span class="lbl" id="sum-label-product"></span>
          <span class="val" id="sum-product"></span>
        </div>
        <div class="sum-row">
          <span class="lbl" id="sum-label-qty"></span>
          <span class="val" id="sum-qty"></span>
        </div>
        <div class="sum-row">
          <span class="lbl" id="sum-label-weight"></span>
          <span class="val" id="sum-weight"></span>
        </div>
        <div class="sum-row">
          <span class="lbl" id="sum-label-delivery"></span>
          <span class="val status-neutral" id="sum-delivery"></span>
        </div>
        <div class="sum-row total">
          <span class="lbl" id="sum-label-total"></span>
          <span class="val" id="sum-total"></span>
        </div>
        <button class="btn-wa" onclick="sendWhatsApp()"></button>
        <div class="region-note"></div>
      </div>
    </div>
  </div>

  <footer class="footer-order">
    <img class="footer-logo" src="" alt="">
    <p></p>
  </footer>
</div>

<button class="wa-float" onclick="window.open('https://wa.me/' + CONFIG.whatsapp, '_blank')">
  <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.67-.51-.173-.008-.371 0-.57 0-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.076 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421-7.403h-.004a9.87 9.87 0 00-4.869 1.271c-.945.468-1.81 1.101-2.542 1.87C3.4 8.433 2.6 9.789 2.132 11.291c-.467 1.501-.382 3.09.247 4.577.627 1.485 1.768 2.769 3.152 3.575 1.383.806 2.952 1.07 4.544.759 1.59-.313 3.084-1.172 4.207-2.433.947-1.006 1.632-2.324 1.957-3.747l-.003-.001a9.872 9.872 0 00-1.724-5.231c-.66-.886-1.516-1.618-2.462-2.107-.945-.49-1.975-.727-3.008-.728zm0 0"/>
  </svg>
</button>

<script src="config.js"></script>
<script src="app.js"></script>

</body>
</html>
