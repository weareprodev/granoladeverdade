<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="">
  <title></title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<nav id="main-nav">
  <div class="nav-inner">
    <div class="nav-logo" onclick="goHome()">
      <img src="" alt="">
    </div>
    <button class="nav-cta" onclick="goPedido()"></button>
  </div>
</nav>

<div id="page-home" class="page active">
  <div class="container">
    <div class="hero fade-in">
      <div class="hero-side">
        <div class="hero-copy">
          <div class="hero-badge"></div>
          <h1></h1>
          <p class="hero-desc"></p>
        </div>

        <div class="hero-details">
          <div class="float-badges"></div>

          <div class="hero-actions">
            <button class="btn-primary" onclick="goPedido()"></button>
            <button class="btn-ghost" onclick="document.getElementById('sobre').scrollIntoView({ behavior: 'smooth' })"></button>
          </div>
        </div>
      </div>

      <div class="hero-img-wrap">
        <img src="" alt="">
      </div>
    </div>
  </div>

  <div class="ingredients">
    <div id="ingredients-track" class="ing-track"></div>
  </div>

  <div class="stats-bar">
    <div class="stats-grid"></div>
  </div>

  <section id="sobre" class="section fade-in">
    <div class="container">
      <div class="about-inner">
        <div class="about-img-wrap">
          <img src="" alt="">
        </div>
        <div class="about-copy">
          <div class="section-label"></div>
          <h2></h2>
          <p></p>
          <div class="pills"></div>
        </div>
      </div>
    </div>
  </section>

  <section class="t-section fade-in">
    <div class="container">
      <div class="section-header">
        <div class="lbl" id="testimonials-label"></div>
        <h2 id="testimonials-title"></h2>
      </div>
      <div class="hero-trust testimonials-trust">
        <div class="hero-avatars"></div>
        <div class="hero-trust-text"></div>
      </div>
      <div class="t-stack"></div>
    </div>
  </section>

  <div class="container">
    <div class="cta-block fade-in">
      <div class="cta-copy">
        <h2></h2>
        <img class="cta-image cta-image-mobile" src="" alt="">
        <p></p>
        <button class="btn-light" onclick="goPedido()"></button>
      </div>
      <img class="cta-image cta-image-desktop" src="" alt="">
    </div>
  </div>

  <footer>
    <img class="footer-logo" src="" alt="">
    <p></p>
  </footer>
</div>

<div id="page-pedido" class="page">
  <div class="container">
    <div class="pedido-hero">
      <div class="lbl"></div>
      <h1></h1>
      <p></p>
    </div>
  </div>

  <div class="container">
    <div class="product-strip">
      <div class="pi-img">
        <img src="" alt="">
      </div>
      <div class="pi-text">
        <h3></h3>
        <p></p>
        <div class="pi-badges"></div>
      </div>
    </div>

    <div class="qty-label-row"></div>
    <div class="qty-stack"></div>

    <div class="delivery-note"></div>

    <div id="empty-state"></div>

    <div id="order-summary-wrap">
      <div class="order-summary">
        <h3></h3>
        <div class="sum-row">
          <span class="lbl" id="sum-label-product"></span>
          <span class="val" id="sum-product"></span>
        </div>
        <div class="sum-row">
          <span class="lbl" id="sum-label-qty"></span>
          <span class="val" id="sum-qty"></span>
        </div>
        <div class="sum-row">
          <span class="lbl" id="sum-label-weight"></span>
          <span class="val" id="sum-weight"></span>
        </div>
        <div class="sum-row">
          <span class="lbl" id="sum-label-delivery"></span>
          <span class="val status-neutral" id="sum-delivery"></span>
        </div>
        <div class="sum-row total">
          <span class="lbl" id="sum-label-total"></span>
          <span class="val" id="sum-total"></span>
        </div>
        <button class="btn-wa" onclick="sendWhatsApp()"></button>
        <div class="region-note"></div>
      </div>
    </div>
  </div>

  <footer class="footer-order">
    <img class="footer-logo" src="" alt="">
    <p></p>
  </footer>
</div>

<button class="wa-float" onclick="window.open('https://wa.me/' + CONFIG.whatsapp, '_blank')">
  <img class="wa-float-icon" src="GVIMG/Digital_Glyph_White.svg" alt="">
</button>

<script src="config.js"></script>
<script src="app.js"></script>

</body>
</html>
